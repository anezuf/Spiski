name: Extract domains
on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Download and extract
        run: |
          wget -qO dlc.yml https://github.com/v2fly/domain-list-community/releases/latest/download/dlc.dat_plain.yml
          mkdir -p lists/
          python3 extract.py

      - name: Generate geosite.dat (only mylist)
        run: |
          git clone --depth=1 https://github.com/v2fly/domain-list-community.git dlc-tool
          # Удаляем все стандартные списки, оставляем только наш mylist
          rm -rf dlc-tool/data
          mkdir -p dlc-tool/data
          cp geo-data/mylist dlc-tool/data/mylist
          cd dlc-tool
          go run ./ --datapath=data --outputname=geosite.dat --outputdir=../
          cd ..
          echo "geosite.dat size: $(wc -c < geosite.dat) bytes"

      - name: Commit
        run: |
          git config user.email "bot@bot"
          git config user.name "bot"
          git add Stash/ lists/ geosite.dat geoip.dat happ-routing.json happ-routing-deeplink.txt
          git commit -m "Update lists" && git push || true
