name: Extract domains
on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download and extract
        run: |
          wget -qO dlc.yml https://github.com/v2fly/domain-list-community/releases/latest/download/dlc.dat_plain.yml
          mkdir -p lists/
          cat << 'PYEOF' > extract.py
import re
content = open('dlc.yml').read()
cats = ['anthropic','openai','google','apple','microsoft','cloudflare']
for cat in cats:
    domains = []
    in_section = False
    for line in content.splitlines():
        if line == '- name: ' + cat:
            in_section = True
            continue
        if in_section:
            if line.startswith('- name:'):
                break
            m = re.search(r'"domain:([^"]+)"', line)
            if m:
                domains.append(m.group(1).strip())
    open('lists/' + cat + '.lst', 'w').write('\n'.join(domains))
    print('=== ' + cat + ': ' + str(len(domains)) + ' domains ===')
PYEOF
          python3 extract.py
      - name: Commit
        run: |
          git config user.email "bot@bot"
          git config user.name "bot"
          git add lists/
          git commit -m "Update lists" && git push || true
